<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="assets/img/favicon_sito.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
   <header>
        <nav class="navbar navbar-expand-lg bg-light border-bottom py-3">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html"></a>

                <div class="ms-auto">
                    <a class="me-3 text-decoration-none text-dark" href="index.html">Home</a>
                    <a class="me-3 text-decoration-none text-dark" href="cv.html">Curriculum</a>
                    <a class="text-decoration-none fw-semibold text-dark" href="contatti.html">Contatti</a>
                </div>
            </div>
        </nav>
    </header>

<main class="container my-5">
    <section class="contact-page card-box">
        <h1>Contattami</h1>
        <p>Compila il form per inviarmi un messaggio.</p>

        <form>
            <div>
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" required>
            </div>

            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div>
                <label for="messaggio">Messaggio</label>
                <textarea id="messaggio" name="messaggio" required></textarea>
            </div>

            <button type="submit" class="btn">Invia</button>
        </form>
    </section>
</main>
</body>
</html>
